<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quest Fitness</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    transition:0.3s;
}

.glow{
    animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{box-shadow:0 0 10px rgba(255,200,50,0.3);}
    to{box-shadow:0 0 25px rgba(255,200,50,0.7);}
}

.light-mode{
    background:#f3f4f6;
    color:black;
}

button{
    transition:0.3s;
}

.rest-box{
    animation:fade 0.4s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body class="bg-gray-900 text-white">

<!-- GENDER SCREEN -->
<div id="genderScreen" class="min-h-screen flex items-center justify-center p-5">

<div class="w-full max-w-md bg-gray-800 rounded-3xl p-6 shadow-2xl glow text-center">

<h1 class="text-3xl font-bold mb-3">
🏋️ Fitness Quest
</h1>

<p class="text-gray-300 mb-6">
Choose your character
</p>

<div class="flex gap-4">

<button onclick="selectGender('male')"
class="flex-1 bg-blue-500 hover:scale-105 p-5 rounded-2xl font-bold">
👦 Male
</button>

<button onclick="selectGender('female')"
class="flex-1 bg-pink-500 hover:scale-105 p-5 rounded-2xl font-bold">
👧 Female
</button>

</div>

</div>

</div>

<!-- WORKOUT SCREEN -->
<div id="workoutScreen" class="hidden min-h-screen flex items-center justify-center p-5">

<div id="mainCard"
class="w-full max-w-md bg-gray-800 rounded-3xl p-6 shadow-2xl glow">

<div class="flex justify-between items-center mb-4">

<h1 class="text-3xl font-bold">
⚔️ Daily Quest
</h1>

<button onclick="toggleTheme()"
class="bg-indigo-500 px-3 py-2 rounded-xl">
🌙
</button>

</div>

<p class="text-gray-300 mb-4">
Level up by exercising
</p>

<div class="mb-4">

<div class="flex justify-between mb-1">
<span>Level <span id="levelText">1</span></span>
<span><span id="xpText">0</span> XP</span>
</div>

<div class="w-full bg-gray-700 rounded-full h-5 overflow-hidden">
<div id="xpBar"
class="bg-yellow-400 h-5 rounded-full transition-all duration-500"
style="width:0%">
</div>
</div>

</div>

<div id="exerciseCard" class="bg-gray-700 rounded-2xl p-5 text-center">

<img id="exerciseImage"
src=""
<div class="flex justify-center items-center h-52 bg-black rounded-2xl mb-4 overflow-hidden">

<img id="exerciseImage"
class="max-h-full max-w-full object-contain">

</div>


<h2 id="exerciseName"
class="text-2xl font-bold mb-2">
</h2>

<p id="exerciseInfo"
class="text-gray-300 mb-4">
</p>

<div id="restBox"
class="hidden rest-box bg-yellow-500 text-black p-4 rounded-2xl mb-4 font-bold">

⏳ Rest Time:
<span id="countdownText">30</span>s

</div>

<button id="nextBtn"
class="bg-green-500 hover:scale-105 px-6 py-3 rounded-2xl font-bold">
DONE
</button>

</div>

</div>

</div>

<script>

const maleWorkouts = [

{
    name:"💪 Push Up",
    reps:10,
    sets:3,
    xp:15,
    image:"https://media1.tenor.com/m/0PnchcCC_0QAAAAC/push-up.gif"
},

{
    name:"🦵 Squat",
    reps:15,
    sets:3,
    xp:20,
    image:"https://media1.tenor.com/m/az0JItvEfugAAAAC/cuadricepsms.gif"
},

{
    name:"🧱 Plank",
    reps:30,
    sets:2,
    xp:25,
    image:"https://experiencelife.lifetime.life/wp-content/uploads/2024/11/jf25-ff-plank.jpg"
}

];

const femaleWorkouts = [

{
    name:"🧘 Yoga Stretch",
    reps:15,
    sets:2,
    xp:10,
    image:"https://media1.tenor.com/m/eTcytFUmakwAAAAC/exercise.gif"
},

{
    name:"🦵 Squat",
    reps:12,
    sets:3,
    xp:18,
    image:"https://media1.tenor.com/m/az0JItvEfugAAAAC/cuadricepsms.gif"
},

{
    name:"🏃 Jumping Jack",
    reps:20,
    sets:2,
    xp:15,
    image:"https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHNlemVqcWJwOGp5djkyeXlwbXhjdTM5cGw3OWVsdDA4a3F0NzhyOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/RgtuKqJ8rPII4qdRjp/giphy.gif"
}

];

let workouts = [];

let currentWorkout = 0;
let currentSet = 1;
let isResting = false;
let restTimer = 30;
let countdown;

let playerData = {
    xp:0,
    level:1,
    gender:""
};

const exerciseName =
document.getElementById("exerciseName");

const exerciseInfo =
document.getElementById("exerciseInfo");

const exerciseImage =
document.getElementById("exerciseImage");

const nextBtn =
document.getElementById("nextBtn");

const restBox =
document.getElementById("restBox");

const countdownText =
document.getElementById("countdownText");

const xpText =
document.getElementById("xpText");

const levelText =
document.getElementById("levelText");

const xpBar =
document.getElementById("xpBar");

function saveData(){
    localStorage.setItem(
        "fitnessPlayer",
        JSON.stringify(playerData)
    );
}

function loadData(){

    const saved =
    localStorage.getItem("fitnessPlayer");

    if(saved){
        playerData = JSON.parse(saved);
    }

}

function updateUI(){

    xpText.innerText = playerData.xp;

    levelText.innerText = playerData.level;

    const percent =
    playerData.xp % 100;

    xpBar.style.width =
    percent + "%";

}

function gainXP(amount){

    playerData.xp += amount;

    if(playerData.xp >= playerData.level * 100){
        playerData.level++;
    }

    saveData();
    updateUI();

}

function selectGender(gender){

    playerData.gender = gender;

    saveData();

    if(gender === "male"){
        workouts = maleWorkouts;
    }else{
        workouts = femaleWorkouts;
    }

    document
    .getElementById("genderScreen")
    .classList.add("hidden");

    document
    .getElementById("workoutScreen")
    .classList.remove("hidden");

    renderWorkout();

}

function renderWorkout(){

    const workout =
    workouts[currentWorkout];

    exerciseName.innerText =
    workout.name;

    exerciseInfo.innerText =
    `${workout.reps} reps • Set ${currentSet}/${workout.sets}`;

    exerciseImage.src =
    workout.image;

}

function startRest(){

    isResting = true;

    restTimer = 30;

    restBox.classList.remove("hidden");

    countdownText.innerText =
    restTimer;

    nextBtn.disabled = true;

    nextBtn.classList.add("opacity-50");

    exerciseInfo.innerText =
    "⏳ Resting...";

    countdown = setInterval(function(){

        restTimer--;

        countdownText.innerText =
        restTimer;

        if(restTimer <= 0){

            clearInterval(countdown);

            isResting = false;

            nextBtn.disabled = false;

            nextBtn.classList.remove("opacity-50");

            restBox.classList.add("hidden");

            nextBtn.innerText = "NEXT";

        }

    },1000);

}

nextBtn.addEventListener("click", function(){

    const workout =
    workouts[currentWorkout];

    if(isResting){
        return;
    }

    if(nextBtn.innerText === "DONE"){

        startRest();

    }else{

        currentSet++;

        if(currentSet > workout.sets){

            gainXP(workout.xp);

            currentWorkout++;

            currentSet = 1;

            if(currentWorkout >= workouts.length){

                exerciseName.innerText =
                "🎉 Workout Complete";

                exerciseInfo.innerText =
                "You finished today's workout.";

                exerciseImage.style.display =
                "none";

                nextBtn.style.display =
                "none";

                return;
            }

        }

        nextBtn.innerText = "DONE";

        renderWorkout();

    }

});

function toggleTheme(){

function toggleTheme(){

    document.body.classList.toggle("light-mode");

    const mainCard =
    document.getElementById("mainCard");

    const exerciseCard =
    document.getElementById("exerciseCard");

    if(document.body.classList.contains("light-mode")){

        mainCard.classList.remove("bg-gray-800");
        mainCard.classList.add("bg-white");

        exerciseCard.classList.remove("bg-gray-700");
        exerciseCard.classList.add("bg-gray-200");

        localStorage.setItem("theme","light");

    }else{

        mainCard.classList.remove("bg-white");
        mainCard.classList.add("bg-gray-800");

        exerciseCard.classList.remove("bg-gray-200");
        exerciseCard.classList.add("bg-gray-700");

        localStorage.setItem("theme","dark");

    }

}

const savedTheme =
localStorage.getItem("theme");


if(savedTheme === "light"){

    document.body.classList.add("light-mode");

    document
    .getElementById("mainCard")
    .classList.replace("bg-gray-800","bg-white");

    document
    .getElementById("exerciseCard")
    .classList.replace("bg-gray-700","bg-gray-200");

}


loadData();
updateUI();

}
</script>

</body>
</html>
